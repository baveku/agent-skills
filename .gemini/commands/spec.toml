description = "Start spec-driven development — write a structured specification before writing code"

prompt = """
Invoke the spec-driven-development skill.

Begin by understanding what the user wants to build. Classify the target platform as web, Apple platform, or shared backend/library. For Apple work, capture the app target, OS deployment range, SwiftUI/UIKit/AppKit split, persistence model, signing constraints, and simulator/device verification path.

Ask clarifying questions about:
1. The objective and target users
2. Core features and acceptance criteria
3. Tech stack preferences and constraints
4. Known boundaries (what to always do, ask first about, and never do)

Then generate a structured spec covering all six core areas: objective, commands, project structure, code style, testing strategy, and boundaries. For Apple-platform specs, include exact `xcodebuild` or SwiftPM commands, test target names, simulator destination, and any App Store/TestFlight constraints that affect implementation.

Save the spec as SPEC.md in the project root and confirm with the user before proceeding.
"""
